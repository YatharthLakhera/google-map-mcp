services:
  google-maps-mcp:
    build: .
    container_name: google-maps-mcp
    restart: unless-stopped
    environment:
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN}
      TRANSPORT: sse
      PORT: 3000
      RATE_LIMIT_PER_DAY: ${RATE_LIMIT_PER_DAY:-1000}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-604800}
      CACHE_DB_PATH: /home/app/.google-map-mcp/cache.db
    volumes:
      - mcp-cache:/home/app/.google-map-mcp
    networks:
      - hermes-net
    expose:
      - "3000"

volumes:
  mcp-cache:

networks:
  hermes-net:
    name: ${HERMES_NETWORK:-hermes-net}
    external: ${HERMES_NETWORK_EXTERNAL:-false}
