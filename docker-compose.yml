services:
  google-maps-mcp:
    build: .
    container_name: google-maps-mcp
    restart: unless-stopped
    environment:
      GOOGLE_PLACES_API_KEY: ${GOOGLE_PLACES_API_KEY}
      TRANSPORT: sse
      PORT: 3000
      RATE_LIMIT_PER_DAY: ${RATE_LIMIT_PER_DAY:-1000}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-604800}
    volumes:
      # SQLite cache persisted across container restarts
      - mcp-cache:/root/.google-map-mcp
    networks:
      - hermes-net
    # Not exposed to the host — internal Docker network only
    expose:
      - "3000"

volumes:
  mcp-cache:

networks:
  hermes-net:
    # Attach to the same network Hermes is on.
    # Run: docker network ls   → find Hermes's network name
    # Then set HERMES_NETWORK=<name> in .env, or replace "hermes-net" below.
    name: ${HERMES_NETWORK:-hermes-net}
    external: ${HERMES_NETWORK_EXTERNAL:-false}
